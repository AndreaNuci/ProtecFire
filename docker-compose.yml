version: "3.9"

services:

  web:
    image: php:8.2-apache
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    command: bash -c "docker-php-ext-install mysqli && a2enmod rewrite && apache2-foreground"
    depends_on:
      - db

  db:
    image: mysql:5.7
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: incendios
    ports:
      - "3306:3306"
    volumes:
      - ./incendios.sql:/docker-entrypoint-initdb.d/incendios.sql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    ports:
      - "8080:80"
    environment:
      PMA_HOST: db
      MYSQL_ROOT_PASSWORD: root
    depends_on:
      - db